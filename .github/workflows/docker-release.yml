name: Build and Release

# Triggers:
#   • Every push to master  → tests + Docker image (SHA + "latest" tags)
#   • Every version tag     → tests + JAR GitHub Release + Docker image (semver tags)
#
# Job graph:
#   build-and-test  ──►  release   (tag pushes only — attaches JAR to GitHub Release)
#                   ──►  docker    (master + tag pushes — pushes image to GHCR)
#
# The two downstream jobs run in parallel and are independent of each other.
# No external secrets required — GITHUB_TOKEN covers GHCR and GitHub Releases.

on:
  push:
    branches:
      - master
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # e.g. v1.2.3

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/trackwarrants

jobs:
  # ── Job 1: build & test (always runs) ────────────────────────────────────────
  build-and-test:
    name: Build & Test (Maven)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run full test suite
        working-directory: main
        run: ./mvnw clean verify -B

      - name: Upload Surefire test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: main/target/surefire-reports/
          retention-days: 14

      # Rename to a versioned filename before uploading so the release asset
      # is unambiguous:
      #   version tags  → trackwarrants-v1.2.3.jar
      #   branch pushes → trackwarrants-abc1234.jar  (short SHA)
      - name: Stage versioned JAR
        run: |
          REF="${{ github.ref_name }}"
          if [[ "$REF" == v* ]]; then
            JAR_NAME="trackwarrants-${REF}.jar"
          else
            SHA="${{ github.sha }}"
            JAR_NAME="trackwarrants-${SHA:0:7}.jar"
          fi
          cp main/target/main-0.0.1-SNAPSHOT.jar "/tmp/${JAR_NAME}"
          echo "JAR_NAME=${JAR_NAME}" >> $GITHUB_ENV

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: trackwarrants-jar
          path: /tmp/${{ env.JAR_NAME }}
          retention-days: 90

  # ── Job 2: GitHub Release with JAR (version tags only) ───────────────────────
  release:
    name: GitHub Release (JAR)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write    # create releases and upload assets

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: trackwarrants-jar
          path: release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TrackWarrants ${{ github.ref_name }}
          body: |
            ## TrackWarrants ${{ github.ref_name }}

            ### Run the JAR directly (Java 17+ required)
            ```bash
            java -jar trackwarrants-${{ github.ref_name }}.jar
            ```
            Open **http://localhost:8080** in your browser.

            To connect to an external PostgreSQL database (production profile):
            ```bash
            java -jar trackwarrants-${{ github.ref_name }}.jar \
              --spring.profiles.active=prod \
              --DB_HOST=<host> \
              --DB_PORT=5432 \
              --DB_NAME=trackwarrants \
              --DB_USER=<user> \
              --DB_PASSWORD=<password>
            ```

            ### Run via Docker
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            docker run --rm -p 8080:8080 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            With RDS / PostgreSQL:
            ```bash
            docker run --rm -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DB_HOST=<rds-endpoint> \
              -e DB_PORT=5432 \
              -e DB_NAME=trackwarrants \
              -e DB_USER=trackwarrants \
              -e DB_PASSWORD=<password> \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```
          files: release-assets/*.jar
          generate_release_notes: true
          draft: false
          prerelease: false

  # ── Job 3: build & push Docker image ─────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test          # gates on tests; runs independently of release job
    permissions:
      packages: write              # push to GHCR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR (skip tests — already passed in build-and-test)
        working-directory: main
        run: ./mvnw clean package -DskipTests -B -q

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: main
          file: main/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ github.ref_name }}
            BUILD_SHA=${{ github.sha }}

